services:
  app:
    build: .
    ports:
      - "8080:8080"
    command:
      - "./server"
      - "-storage"
      - "postgres"
      - "-connect"
      - "postgres://user:pass@db:5432/urlshorter?sslmode=disable"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: urlshorter
    ports:
      - "5432:5432"